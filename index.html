<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARENDA PLAYSTATION</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="app">

<!-- HOME -->
<section id="home" class="page active">

    <h1>🎮 ARENDA PLAYSTATION</h1>
    <p class="sub">Более 2500 игр</p>

    <div class="card">
        <div class="status free">● Свободна</div>
        <h2>PlayStation 4 Pro</h2>
    </div>

    <div class="card">
        <div class="status free">● Свободна</div>
        <h2>PlayStation 5 Pro</h2>
    </div>

</section>

<!-- GAMES -->
<section id="games" class="page">

    <h1>🎯 Каталог игр</h1>

    <div class="grid">
        <div class="tile">GTA V</div>
        <div class="tile">FIFA 25</div>
        <div class="tile">UFC 5</div>
        <div class="tile">Spider-Man 2</div>
        <div class="tile">Cyberpunk 2077</div>
        <div class="tile">The Last Of Us</div>
    </div>

</section>

<!-- BOOKING -->
<section id="booking" class="page">

    <h1>📅 Бронирование</h1>

    <div class="card">
        Календарь и бронирование скоро
    </div>

</section>

<!-- PROFILE -->
<section id="profile" class="page">

    <h1>👤 Профиль</h1>

    <div class="card">
        <div class="avatar">👤</div>
        <p id="name">Пользователь</p>
        <p id="id">ID: -</p>
    </div>

</section>

</div>

<!-- NAV -->
<div class="nav">

<button data-page="home">Главная</button>
<button data-page="games">Игры</button>
<button data-page="booking">Бронь</button>
<button data-page="profile">Профиль</button>

</div>

<script src="script.js"></script>

</body>
</html>
