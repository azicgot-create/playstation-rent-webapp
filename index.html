<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARENDA PLAYSTATION</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

    <div id="home-page" class="page active">

        <h1>ARENDA PLAYSTATION</h1>

        <p class="subtitle">
            Более 2500 игр
        </p>

        <div class="console-card">
            <div class="status free">● Свободна</div>
            <h2>PlayStation 4 Pro</h2>
        </div>

        <div class="console-card">
            <div class="status busy">● Забронирована</div>
            <h2>PlayStation 5 Pro</h2>
        </div>

    </div>

    <div id="games-page" class="page">
        <h1>Каталог игр</h1>

        <div class="card">
            FIFA 25
        </div>

        <div class="card">
            GTA V
        </div>

        <div class="card">
            UFC 5
        </div>
    </div>

    <div id="booking-page" class="page">
        <h1>Бронирование</h1>

        <div class="card">
            Тут позже будет календарь брони
        </div>
    </div>

    <div id="support-page" class="page">
        <h1>Поддержка</h1>

        <div class="card">
            @heartbreakdrip
        </div>
    </div>

    <div id="profile-page" class="page">
        <h1>Профиль</h1>

        <div class="card">
            История заказов появится позже
        </div>
    </div>

    <nav class="bottom-nav">

        <button class="nav-btn active" onclick="showPage('home-page', this)">
            <img src="images/home.png">
            <span>Главная</span>
        </button>

        <button class="nav-btn" onclick="showPage('games-page', this)">
            <img src="images/games.png">
            <span>Игры</span>
        </button>

        <button class="nav-btn" onclick="showPage('booking-page', this)">
            <img src="images/booking.png">
            <span>Бронь</span>
        </button>

        <button class="nav-btn" onclick="showPage('support-page', this)">
            <img src="images/support.png">
            <span>Поддержка</span>
        </button>

        <button class="nav-btn" onclick="showPage('profile-page', this)">
            <img src="images/profile.png">
            <span>Профиль</span>
        </button>

    </nav>

    <script src="script.js"></script>

</body>
</html>
